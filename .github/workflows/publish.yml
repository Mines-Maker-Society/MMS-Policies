name: Publish to public git

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build LaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: MMS-Policies.tex

      - name: Start SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Push
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

          git clone git@github.com:Mines-Maker-Society/MMS-Policies-Public.git public
          cp MMS-Policies.pdf public/MMS_Policies.pdf

          cd public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add MMS-Policies.pdf
          git diff --cached --quiet && exit 0

          git commit -m "Update MMS-Policies.pdf (${GITHUB_SHA})"
          git push
